<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>NYC Micro-Prairie Habitat Matrix</title>
<meta name="description" content="A 520 sq ft NYC micro-prairie: 101 native plants and every documented flower-visitor. @thistle_enjoyer">
<style>
  :root{ --cream:#F2ECDD; --ink:#141212; --puce:#D6006E; --steel:#6a655e; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--cream);color:var(--ink);
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
  header{position:sticky;top:0;z-index:20;background:rgba(242,236,221,.94);
    backdrop-filter:saturate(1.1) blur(6px);
    border-bottom:1px solid rgba(20,18,18,.16);
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:9px 14px;}
  header .t{font-weight:800;letter-spacing:.02em;font-size:13px;text-transform:uppercase;line-height:1.15;}
  header .t small{display:block;font-weight:400;text-transform:none;color:var(--steel);
    font-size:10px;letter-spacing:.04em;margin-top:2px;}
  header a.dl{color:var(--puce);text-decoration:none;font-weight:800;font-size:11px;
    letter-spacing:.04em;border:1.6px solid var(--puce);border-radius:5px;
    padding:7px 12px;white-space:nowrap;text-transform:uppercase;}
  header a.dl:active{background:var(--puce);color:var(--cream);}
  #viewer{max-width:900px;margin:0 auto;padding:16px 10px 44px;}
  .page{position:relative;margin:0 auto 16px;background:var(--cream);
    box-shadow:0 3px 16px rgba(0,0,0,.16);width:100%;aspect-ratio:612 / 792;
    overflow:hidden;}
  .page canvas{display:block;width:100%;height:auto;}
  .annot{position:absolute;inset:0;}
  .annot a{position:absolute;display:block;}         /* invisible clickable hotspots over PDF links */
  .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:var(--steel);font-size:12px;letter-spacing:.08em;}
  #status{max-width:700px;margin:60px auto;text-align:center;color:var(--steel);
    font-size:13px;letter-spacing:.03em;padding:0 20px;}
  #status a{color:var(--puce);}
  footer{padding:22px 16px 40px;text-align:center;color:var(--steel);
    font-size:11px;letter-spacing:.06em;}
  footer b{color:var(--ink);}
</style>
</head>
<body>
<header>
  <div class="t">Habitat Matrix
    <small>Plant Inventory + Flower-Visitors Associated &nbsp;·&nbsp; @thistle_enjoyer</small>
  </div>
  <a class="dl" href="matrix.pdf" download>Download</a>
</header>

<div id="status">Loading the matrix…</div>
<div id="viewer" hidden></div>
<footer>@thistle_enjoyer &nbsp;·&nbsp; <b>520 sq ft, NYC</b> &nbsp;·&nbsp; complete plant &amp; pollinator matrix</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
(function(){
  // cache-buster: always fetch the freshest matrix.pdf (bypasses browser + CDN cache)
  const FILE = "matrix.pdf?t=" + Date.now();
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

  const viewer = document.getElementById("viewer");
  const statusEl = document.getElementById("status");
  const dpr = Math.min(window.devicePixelRatio || 1, 2.5);
  const cw = () => Math.min(viewer.clientWidth - 20, 900);

  pdfjsLib.getDocument(FILE).promise.then(async (pdf) => {
    statusEl.remove();
    viewer.hidden = false;
    const N = pdf.numPages;
    const divs = [];
    for (let i = 1; i <= N; i++) {
      const d = document.createElement("div");
      d.className = "page"; d.dataset.n = i;
      const ph = document.createElement("div");
      ph.className = "ph"; ph.textContent = i + " / " + N;
      d.appendChild(ph);
      viewer.appendChild(d); divs.push(d);
    }

    const done = new Set();
    async function render(div) {
      const n = +div.dataset.n;
      if (done.has(n)) return; done.add(n);
      const page = await pdf.getPage(n);
      const base = page.getViewport({ scale: 1 });
      const width = cw();
      const s = width / base.width;
      const vp = page.getViewport({ scale: s * dpr });

      const canvas = document.createElement("canvas");
      canvas.width = Math.floor(vp.width);
      canvas.height = Math.floor(vp.height);
      const ctx = canvas.getContext("2d", { alpha: false });
      await page.render({ canvasContext: ctx, viewport: vp }).promise;

      // clickable link hotspots (source URLs etc.)
      const cssVp = page.getViewport({ scale: s });
      const layer = document.createElement("div");
      layer.className = "annot";
      try {
        const annots = await page.getAnnotations();
        annots.forEach((a) => {
          if (a.subtype === "Link" && a.url) {
            const r = cssVp.convertToViewportRectangle(a.rect);
            const x = Math.min(r[0], r[2]), y = Math.min(r[1], r[3]);
            const w = Math.abs(r[2] - r[0]), h = Math.abs(r[3] - r[1]);
            const link = document.createElement("a");
            link.href = a.url; link.target = "_blank"; link.rel = "noopener noreferrer";
            link.style.left = (x / cssVp.width * 100) + "%";
            link.style.top = (y / cssVp.height * 100) + "%";
            link.style.width = (w / cssVp.width * 100) + "%";
            link.style.height = (h / cssVp.height * 100) + "%";
            layer.appendChild(link);
          }
        });
      } catch (e) { /* annotations optional */ }

      div.innerHTML = "";
      div.appendChild(canvas);
      div.appendChild(layer);
    }

    let io;
    function observe() {
      io = new IntersectionObserver((entries) => {
        entries.forEach((e) => { if (e.isIntersecting) render(e.target); });
      }, { rootMargin: "800px 0px" });
      divs.forEach((d) => io.observe(d));
    }
    observe();

    // re-render crisply on meaningful width change (e.g. phone rotation)
    let last = cw(), t;
    window.addEventListener("resize", () => {
      clearTimeout(t);
      t = setTimeout(() => {
        const w = cw();
        if (Math.abs(w - last) < 40) return;
        last = w; io.disconnect(); done.clear();
        divs.forEach((d) => {
          d.innerHTML = "";
          const ph = document.createElement("div");
          ph.className = "ph"; ph.textContent = d.dataset.n + " / " + N;
          d.appendChild(ph);
        });
        observe();
      }, 350);
    });
  }).catch((err) => {
    console.error(err);
    statusEl.innerHTML =
      'This viewer needs to be opened from a web address (not a local file). ' +
      'Once hosted it will load automatically — or <a href="matrix.pdf">open the PDF directly →</a>';
  });
})();
</script>
</body>
</html>
